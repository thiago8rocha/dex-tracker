name: Feature Request
description: Suggest a feature to improve DexCurator
title: "[Feature] "
labels: ["enhancement"]
assignees: ["thiago8rocha"]

body:
  - type: markdown
    attributes:
      value: |
        Obrigado por sugerir uma melhoria para o DexCurator!
        Preencha os campos abaixo com o máximo de detalhes possível.

  - type: textarea
    id: description
    attributes:
      label: Descrição da sugestão
      description: Descreva claramente o que você gostaria de ver no app.
      placeholder: "Ex: Gostaria de poder filtrar Pokémon por habilidade na tela principal..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problema que resolve
      description: Esta sugestão está relacionada a alguma dificuldade ou limitação atual?
      placeholder: "Ex: Sempre fico perdido quando tento encontrar Pokémon com a habilidade X porque..."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Solução proposta
      description: Descreva como você imagina que a funcionalidade funcionaria.
      placeholder: "Ex: Um campo de busca por habilidade no filtro avançado da Pokédex..."
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Módulo do app
      description: Qual parte do app esta sugestão afeta?
      options:
        - Pokédex principal
        - Detalhe do Pokémon
        - Pokémon GO
        - TCG Pocket
        - Pokopia
        - Configurações
        - Outro
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Contexto adicional
      description: Screenshots, referências, exemplos de outros apps, etc.
      placeholder: "Cole imagens ou links aqui..."
    validations:
      required: false

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Confirmações
      description: Leia com atenção antes de enviar.
      options:
        - label: Pesquisei as issues existentes e esta sugestão **não é duplicata** de outra já aberta ou fechada.
          required: true
        - label: Escrevi um título curto e descritivo.
          required: true
        - label: Preenchi todas as informações solicitadas neste formulário.
          required: true
