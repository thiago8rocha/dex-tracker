name: Data Report
description: Report a data issue on DexCurator
title: "[Data] "
labels: ["data"]
assignees: ["thiago8rocha"]

body:
  - type: markdown
    attributes:
      value: |
        Encontrou um dado incorreto no DexCurator? Stats errados, tipo incorreto, golpe faltando, tradução estranha?
        Preencha os campos abaixo com o máximo de detalhes e a fonte que comprova o erro.

  - type: input
    id: pokemon
    attributes:
      label: Pokémon afetado
      description: Nome e número nacional do Pokémon (se aplicável).
      placeholder: "Ex: Charizard (#6)"
    validations:
      required: false

  - type: dropdown
    id: data_type
    attributes:
      label: Tipo de dado incorreto
      description: O que está errado?
      options:
        - Stats base (HP, Ataque, Defesa, etc.)
        - Tipo do Pokémon
        - Habilidade
        - Golpe (nome, poder, precisão, efeito)
        - Cadeia evolutiva
        - Tradução (PT-BR)
        - Pokédex de jogo específico (entrada incorreta)
        - Dado do Pokémon GO (CP, disponibilidade)
        - Dado do TCG Pocket (carta, set)
        - Dado do Pokopia (habitat, especialidade)
        - Outro
    validations:
      required: true

  - type: dropdown
    id: game
    attributes:
      label: Jogo afetado (se aplicável)
      description: O erro aparece em algum jogo específico ou na Pokédex Nacional?
      options:
        - Nacional (todos os jogos)
        - Red / Blue
        - Yellow
        - Gold / Silver
        - Crystal
        - Ruby / Sapphire
        - FireRed / LeafGreen
        - Emerald
        - Diamond / Pearl
        - Platinum
        - HeartGold / SoulSilver
        - Black / White
        - Black 2 / White 2
        - X / Y
        - Omega Ruby / Alpha Sapphire
        - Sun / Moon
        - Ultra Sun / Ultra Moon
        - Let's Go Pikachu / Eevee
        - Sword / Shield
        - Brilliant Diamond / Shining Pearl
        - Legends Arceus
        - Scarlet / Violet
        - Legends Z-A
        - Pokémon GO
        - TCG Pocket
        - Pokopia
    validations:
      required: false

  - type: textarea
    id: current_value
    attributes:
      label: Valor atual no app
      description: O que o DexCurator está mostrando de errado?
      placeholder: "Ex: O app mostra que Charizard é do tipo Fogo/Voador no jogo X/Y, mas..."
    validations:
      required: true

  - type: textarea
    id: correct_value
    attributes:
      label: Valor correto
      description: Qual deveria ser o valor correto?
      placeholder: "Ex: Charizard é Fogo/Voador, o correto seria..."
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Fonte que comprova o erro
      description: Link da PokéAPI, Bulbapedia, Serebii ou outro. Issues sem fonte podem demorar mais para ser corrigidas.
      placeholder: "Ex: https://bulbapedia.bulbagarden.net/wiki/Charizard_(Pokémon)"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Capturas de tela
      description: Screenshot do app mostrando o dado incorreto.
    validations:
      required: false

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Confirmações
      description: Leia com atenção antes de enviar.
      options:
        - label: Pesquisei as issues existentes e este erro **não é duplicata** de outro já reportado.
          required: true
        - label: Verifiquei o dado em pelo menos uma fonte oficial (PokéAPI, Bulbapedia ou Serebii).
          required: true
        - label: Preenchi todas as informações solicitadas neste formulário.
          required: true
