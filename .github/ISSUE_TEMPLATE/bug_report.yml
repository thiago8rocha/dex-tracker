name: Issue Report
description: Report an issue on DexCurator
title: "[Bug] "
labels: ["bug"]
assignees: ["thiago8rocha"]

body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar um problema no DexCurator!
        Preencha todos os campos obrigatórios para que possamos reproduzir e corrigir o problema.

  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Descreva exatamente o que fazer para reproduzir o problema.
      placeholder: |
        1. Abrir a tela '...'
        2. Tocar em '...'
        3. Ver o erro
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      description: O que deveria acontecer?
      placeholder: "Ex: O app deveria mostrar a lista de golpes corretamente..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamento atual
      description: O que está acontecendo de errado?
      placeholder: "Ex: O app fecha inesperadamente ao abrir a aba Golpes..."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Capturas de tela
      description: Cole screenshots ou gravações de tela se relevante.
      placeholder: "Arraste imagens aqui ou cole o link..."
    validations:
      required: false

  - type: input
    id: app_version
    attributes:
      label: Versão do DexCurator
      description: Você encontra a versão em Configurações → Sobre.
      placeholder: "Ex: 1.0.2"
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Versão do Android
      description: Você encontra em Configurações → Sobre o dispositivo.
      placeholder: "Ex: Android 14"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Dispositivo
      description: Modelo do seu aparelho.
      placeholder: "Ex: Samsung Galaxy S23"
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Informações adicionais
      description: Qualquer contexto extra que possa ajudar na investigação.
    validations:
      required: false

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Confirmações
      description: Leia com atenção antes de enviar.
      options:
        - label: Pesquisei as issues existentes e este problema **não é duplicata** de outra já aberta ou fechada.
          required: true
        - label: Escrevi um título curto e descritivo.
          required: true
        - label: Preenchi todas as informações solicitadas neste formulário, incluindo versão e dispositivo.
          required: true
        - label: Estou usando a versão mais recente do DexCurator disponível.
          required: true
